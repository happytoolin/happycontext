name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4.4.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        uses: actions/checkout@v6.0.2

      - name: Refresh Go module indexes
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        shell: bash
        env:
          RELEASE_OUTPUTS: ${{ toJSON(steps.release.outputs) }}
        run: |
          set -euo pipefail

          refresh_module() {
            local module_path="$1"
            local release_tag="$2"
            local version_tag="${release_tag##*/}"
            local encoded_module="${module_path//\//%2F}"

            echo "== syncing ${module_path}@${version_tag} =="

            for url in \
              "https://proxy.golang.org/${encoded_module}/@v/${version_tag}.info" \
              "https://proxy.golang.org/${encoded_module}/@latest" \
              "https://pkg.go.dev/${module_path}@${version_tag}"
            do
              echo "request: $url"
              curl -fsSIL --retry 3 --retry-delay 2 "$url" >/dev/null || \
                echo "non-fatal: could not refresh $url"
            done
          }

          release_created() {
            local key="$1"
            jq -r --arg key "$key" '.[$key] // "false"' <<<"$RELEASE_OUTPUTS"
          }

          release_tag() {
            local key="$1"
            jq -r --arg key "$key" '.[$key] // empty' <<<"$RELEASE_OUTPUTS"
          }

          while IFS= read -r modfile; do
            moddir="$(dirname "$modfile")"
            module_path="$(sed -n 's/^module //p' "$modfile" | head -n1)"
            if [[ -z "$module_path" ]]; then
              continue
            fi

            if [[ "$moddir" == "." ]]; then
              created="$(release_created "release_created")"
              tag="$(release_tag "tag_name")"
            else
              created="$(release_created "${moddir}--release_created")"
              tag="$(release_tag "${moddir}--tag_name")"
            fi

            if [[ "$created" == "true" && -n "$tag" ]]; then
              refresh_module "$module_path" "$tag"
            fi
          done < <(printf '%s\n' go.mod && git ls-files 'adapter/*/go.mod' 'integration/*/go.mod')
